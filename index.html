<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Kitty Love Letter Generator 💖</title>

    <style>
        body {
            font-family: "Comic Sans MS", cursive, sans-serif;
            background: linear-gradient(to bottom, #ffd6ec, #fff0f7);
            color: #ff1493;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #ff69b4;
            font-size: 42px;
            text-shadow: 2px 2px #fff;
        }

        textarea {
            width: 80%;
            height: 150px;
            background-color: #fff;
            color: #ff1493;
            border: 3px solid #ff69b4;
            border-radius: 15px;
            padding: 15px;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }

        button {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            border-radius: 30px;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            background-color: #ff1493;
            transform: scale(1.05);
        }

        #emailPreview {
            margin-top: 25px;
        }
    </style>
</head>

<body>

    <h1>🎀 Hello Kitty Love Letter Generator 🎀</h1>

    <textarea id="emailContent" placeholder="Write your sweet message for Seemal here... 💕"></textarea><br>

    <button onclick="generateEmail()">💌 Generate Love Letter</button>
    <button onclick="copyEmail()">📋 Copy Love Letter</button>

    <div id="emailPreview" style="display:none;"></div>

    <script>

        function generateEmail() {

            let content = document.getElementById("emailContent").value;

            let emailHTML = `
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
                    style="
                        background: linear-gradient(to bottom, #fff0f7, #ffd6ec);
                        color:#ff1493;
                        font-family:'Comic Sans MS', cursive, sans-serif;
                        max-width:600px;
                        margin:0 auto;
                        padding:25px;
                        border-radius:25px;
                        border:4px solid #ff69b4;
                        box-shadow:0 0 20px rgba(255,105,180,0.4);
                    ">

                    <tr>
                        <td align="center"
                            style="
                                font-size:36px;
                                font-weight:bold;
                                color:#ff69b4;
                                padding-bottom:15px;
                            ">
                            🎀 Hello Kitty Love Letter 🎀
                        </td>
                    </tr>

                    <tr>
                        <td align="center"
                            style="
                                font-size:22px;
                                color:#ff1493;
                                padding-bottom:20px;
                                font-weight:bold;
                            ">
                            To My Sweet Seemal 💖
                        </td>
                    </tr>

                    <tr>
                        <td style="
                            font-size:18px;
                            line-height:1.8;
                            padding:20px;
                            color:#d63384;
                            text-align:left;
                            background:#ffffffaa;
                            border-radius:20px;
                        ">

                            My dearest Seemal 💕

                            <br><br>

                            Every moment with you feels like a beautiful dream I never want to wake up from.
                            Your smile brightens my world, your laughter is my favorite melody,
                            and your love fills my heart with endless happiness.

                            <br><br>

                            ${content.replace(/\n/g, "<br>")}

                            <br><br>

                            No matter where life takes us, I will always cherish you,
                            adore you, and love you more than words could ever explain. 🌸

                            <br><br>

                            You are my happiness, my peace, and my favorite person in the whole universe 💗

                            <br><br>

                            Forever yours,
                            <br>
                            💌
                        </td>
                    </tr>

                    <tr>
                        <td align="center"
                            style="
                                padding-top:25px;
                                font-size:20px;
                                color:#ff69b4;
                            ">
                            🐱💕 XOXO & Kitty Kisses 💕🐱
                        </td>
                    </tr>

                </table>
            `;

            document.getElementById("emailPreview").innerHTML = emailHTML;
            document.getElementById("emailPreview").style.display = "block";
        }

        function copyEmail() {

            let emailPreview = document.getElementById("emailPreview");

            if (!emailPreview.innerHTML.trim()) {
                alert("Please generate the love letter first! 💖");
                return;
            }

            let range = document.createRange();
            range.selectNode(emailPreview);

            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);

            document.execCommand("copy");

            window.getSelection().removeAllRanges();

            alert("💌 Love letter copied! Paste it into Gmail.");
        }

    </script>

</body>
</html>
